# Rime schema
# encoding: utf-8

schema:
  schema_id: biline_pinyin
  name: Biline 现代简体拼音
  version: "0.3"
  author:
    - BilineIME
  description: |
    BilineIME 内置的现代简体拼音方案。Rime 在这里只负责中文拼音候选、用户词典、词频学习和简体转换；
    双层候选、英文预览、英文层提交由上层 Biline 会话负责。

switches:
  - name: zh_simp
    reset: 1
    states: [ 简体, 简体 ]

engine:
  processors:
    - ascii_composer
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
    - fallback_segmentor
  translators:
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: abcdefghijklmnopqrstuvwxyz
  initials: abcdefghijklmnopqrstuvwxyz
  delimiter: " '"
  algebra:
    __patch:
      - pinyin:/abbreviation
      - pinyin:/spelling_correction
      - pinyin:/key_correction

translator:
  dictionary: biline_pinyin
  enable_sentence: true
  enable_completion: true
  enable_user_dict: true
  enable_encoder: true
  encode_commit_history: true
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

simplifier:
  option_name: zh_simp
  opencc_config: t2s.json
  tips: none

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Shift_L: noop
    Shift_R: noop
    Control_L: noop
    Control_R: noop
    Caps_Lock: clear
    Eisu_toggle: clear
