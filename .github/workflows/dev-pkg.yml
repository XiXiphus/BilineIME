name: Dev tester packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "dev-v*"

concurrency:
  group: dev-pkg-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build BilineIMEDev tester packages
    runs-on: macos-15
    timeout-minutes: 45
    env:
      BILINE_AD_HOC_SIGN: "1"
      DERIVED_DATA: ${{ github.workspace }}/.derived-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install build tooling
        run: |
          brew update
          brew install xcodegen librime opencc

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build dev packages
        run: make dev-pkg

      - name: Inspect output
        run: |
          ls -lh build/dist
          for pkg in build/dist/*.pkg; do
            echo "--- $pkg ---"
            if pkgutil --payload-files "$pkg" >/tmp/biline-payload-files.txt 2>/dev/null; then
              sed -n '1,20p' /tmp/biline-payload-files.txt
            else
              echo "(no payload files)"
            fi
            pkgutil --check-signature "$pkg" || true
          done

      - name: Upload pkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BilineIMEDev-packages
          path: build/dist/*.pkg
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/dev-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/dist/*.pkg
          body: |
            BilineIME tester build.

            Packages:

            - `BilineIMEDev-<version>.pkg`: install `BilineIMEDev.app` into `/Library/Input Methods`, `BilineSettingsDev.app` into `/Applications`, and `BilineBrokerDev` plus its LaunchAgent into `/Library/Application Support/BilineIME/Broker` and `/Library/LaunchAgents`
            - `BilineIMEDev-Uninstall-<version>.pkg`: remove the packaged dev apps but preserve Biline user data
            - `BilineIMEDev-DeepClean-<version>.pkg`: remove the packaged dev apps and clear Biline-local data to prepare for a clean future release install

            This `.pkg` is **unsigned** and ad-hoc-signed at the bundle level.
            Gatekeeper will block it on first install. Workaround:

            ```
            sudo xattr -dr com.apple.quarantine BilineIMEDev-*.pkg
            sudo installer -pkg BilineIMEDev-<version>.pkg -target /
            ```

            Or right-click the pkg in Finder and choose Open, then confirm.

            Safe uninstall:

            ```
            sudo installer -pkg BilineIMEDev-Uninstall-<version>.pkg -target /
            ```

            Deep clean before a future release install:

            ```
            sudo installer -pkg BilineIMEDev-DeepClean-<version>.pkg -target /
            ```

            After install or deep clean, log out and back in, then add or re-add the input source from
            System Settings -> Keyboard -> Input Sources.
