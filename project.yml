name: BilineIME

options:
  localPackagesGroup: ""
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic

packages:
  BilineModules:
    path: .

targetTemplates:
  InputMethodBase:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - App
    dependencies:
      - sdk: InputMethodKit.framework
      - package: BilineModules
        product: BilineCore
      - package: BilineModules
        product: BilineHost
      - package: BilineModules
        product: BilinePreview
      - package: BilineModules
        product: BilineSession
      - package: BilineModules
        product: BilineMocks
    info:
      path: App/Support/Info.plist
      properties:
        CFBundleDisplayName: "$(INPUT_METHOD_DISPLAY_NAME)"
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleName: "$(INPUT_METHOD_DISPLAY_NAME)"
        InputMethodConnectionName: "$(PRODUCT_BUNDLE_IDENTIFIER)_Connection"
        InputMethodServerControllerClass: "$(PRODUCT_MODULE_NAME).BilineInputController"
        InputMethodServerDelegateClass: "$(PRODUCT_MODULE_NAME).BilineInputController"
        LSHasLocalizedDisplayName: true
        LSUIElement: true
        NSPrincipalClass: "$(PRODUCT_MODULE_NAME).BilineManualApplication"
        TICapsLockLanguageSwitchCapable: true
        TISIntendedLanguage: zh-Hans
        tsInputMethodIconFileKey: menu_icon.pdf
        tsInputMethodCharacterRepertoireKey:
          - Hans
          - Latn
    entitlements:
      path: App/Support/BilineIME.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.temporary-exception.mach-register.global-name: "$(PRODUCT_BUNDLE_IDENTIFIER)_Connection"
    settings:
      base:
        SWIFT_STRICT_CONCURRENCY: minimal
    postBuildScripts:
      - name: Strip macOS metadata
        script: |
          if [ -d "$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME" ]; then
            xattr -cr "$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME" || true
          fi

targets:
  BilineIMEDev:
    templates:
      - InputMethodBase
    sources:
      - path: Resources/Dev
        buildPhase: resources
    info:
      path: App/Support/Info.plist
      properties:
        ComponentInputModeDict: &devInputModeDict
          TISUnifiedUIForInputMethodEnabling: true
          tsInputModeListKey:
            io.github.xixiphus.inputmethod.BilineIME.dev.pinyin:
              TISInputSourceID: io.github.xixiphus.inputmethod.BilineIME.dev.pinyin
              TISIntendedLanguage: zh-Hans
              tsInputModeAlternateMenuIconFileKey: menu_icon.pdf
              tsInputModeDefaultStateKey: true
              tsInputModeIsVisibleKey: true
              tsInputModeMenuIconFileKey: menu_icon.pdf
              tsInputModePaletteIconFileKey: menu_icon.pdf
              tsInputModePrimaryInScriptKey: true
              tsInputModeScriptKey: smSimpChinese
          tsVisibleInputModeOrderedArrayKey:
            - io.github.xixiphus.inputmethod.BilineIME.dev.pinyin
        InputMethodServerModeDictionary: *devInputModeDict
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.xixiphus.inputmethod.BilineIME.dev
        PRODUCT_NAME: BilineIMEDev
        INPUT_METHOD_DISPLAY_NAME: BilineIME Dev

  BilineIME:
    templates:
      - InputMethodBase
    sources:
      - path: Resources/Release
        buildPhase: resources
    info:
      path: App/Support/Info.plist
      properties:
        ComponentInputModeDict: &releaseInputModeDict
          TISUnifiedUIForInputMethodEnabling: true
          tsInputModeListKey:
            io.github.xixiphus.inputmethod.BilineIME.pinyin:
              TISInputSourceID: io.github.xixiphus.inputmethod.BilineIME.pinyin
              TISIntendedLanguage: zh-Hans
              tsInputModeAlternateMenuIconFileKey: menu_icon.pdf
              tsInputModeDefaultStateKey: true
              tsInputModeIsVisibleKey: true
              tsInputModeMenuIconFileKey: menu_icon.pdf
              tsInputModePaletteIconFileKey: menu_icon.pdf
              tsInputModePrimaryInScriptKey: true
              tsInputModeScriptKey: smSimpChinese
          tsVisibleInputModeOrderedArrayKey:
            - io.github.xixiphus.inputmethod.BilineIME.pinyin
        InputMethodServerModeDictionary: *releaseInputModeDict
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.xixiphus.inputmethod.BilineIME
        PRODUCT_NAME: BilineIME
        INPUT_METHOD_DISPLAY_NAME: BilineIME
