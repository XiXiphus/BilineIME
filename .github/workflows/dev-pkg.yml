name: Dev tester packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "dev-v*"

concurrency:
  group: dev-pkg-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build BilineIMEDev tester packages
    runs-on: macos-15
    timeout-minutes: 45
    env:
      BILINE_AD_HOC_SIGN: "1"
      DERIVED_DATA: ${{ github.workspace }}/.derived-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install build tooling
        run: |
          brew update
          brew install xcodegen librime opencc

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build dev packages
        run: make dev-pkg

      - name: Inspect output
        run: |
          ls -lh build/dist
          for pkg in build/dist/*.pkg; do
            echo "--- $pkg ---"
            if pkgutil --payload-files "$pkg" >/tmp/biline-payload-files.txt 2>/dev/null; then
              sed -n '1,20p' /tmp/biline-payload-files.txt
            else
              echo "(no payload files)"
            fi
            pkgutil --check-signature "$pkg" || true
          done

      - name: Upload pkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BilineIMEDev-packages
          path: build/dist/*.pkg
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/dev-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/dist/*.pkg
          body: |
            First public BilineIME tester beta for the dev lane.

            ## What is included

            - `BilineIMEDev-<version>.pkg`
              - installs `BilineIMEDev.app` into `/Library/Input Methods`
              - installs `BilineSettingsDev.app` into `/Applications`
              - installs `BilineBrokerDev` plus its LaunchAgent into
                `/Library/Application Support/BilineIME/Broker` and `/Library/LaunchAgents`
            - `BilineIMEDev-Uninstall-<version>.pkg`
              - removes the packaged dev apps
              - preserves Biline-local user data
            - `BilineIMEDev-DeepClean-<version>.pkg`
              - removes the packaged dev apps
              - clears Biline-local data to prepare for a clean reinstall or a future release install

            ## What this build is

            - a **prerelease tester build**
            - based on the active **dev lane**
            - intended for trusted local testing, not formal App Store / notarized distribution
            - built as an **unsigned**, ad-hoc-signed package

            ## Verified baseline

            This tester line is shipping after the local TextEdit host-smoke baseline passed for:

            - candidate popup
            - candidate browsing
            - candidate commit
            - safe-boundary settings refresh

            ## Install

            Gatekeeper will block this package on first use because it is unsigned.

            Option 1:

            - right-click the pkg in Finder
            - choose Open
            - confirm the install

            Option 2:

            ```bash
            sudo xattr -dr com.apple.quarantine BilineIMEDev-*.pkg
            sudo installer -pkg BilineIMEDev-<version>.pkg -target /
            ```

            ## Important first-use note

            Installing the bundle and making the input source usable are two separate phases.
            After install or deep clean:

            1. log out and back in if macOS still does not show the source
            2. open System Settings -> Keyboard -> Input Sources
            3. add or re-add `BilineIME Dev`
            4. click any macOS `Allow` prompt manually if one appears

            ## Uninstall

            Safe uninstall:

            ```bash
            sudo installer -pkg BilineIMEDev-Uninstall-<version>.pkg -target /
            ```

            Deep clean:

            ```bash
            sudo installer -pkg BilineIMEDev-DeepClean-<version>.pkg -target /
            ```

            ## Current limits

            - the release lane is still paused; this tag is for the dev/tester lane only
            - first-use source enrollment may still require a manual step in System Settings
            - this release is optimized for local tester feedback, not polished consumer distribution
